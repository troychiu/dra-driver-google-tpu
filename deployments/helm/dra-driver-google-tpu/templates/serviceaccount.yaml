{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dra-driver-google-tpu.serviceAccountName" . }}
  namespace: {{ include "dra-driver-google-tpu.namespace" . }}
  labels:
    {{- include "dra-driver-google-tpu.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
