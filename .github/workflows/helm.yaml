name: Helm

on:
  workflow_call:

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      name: Checkout code

    - name: Set up Helm
      uses: azure/setup-helm@f0accbfd55e3332a28f721b8202b1016cecf90d5 # v5

    - name: Helm Lint
      run: make helm-lint
